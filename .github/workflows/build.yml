name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Permissions minimales — le job release élève les siennes explicitement
permissions:
  contents: read

jobs:
  build:
    name: Build linux/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04      # runner amd64 standard
            goarch: amd64
          - runner: ubuntu-24.04-arm  
            goarch: arm64             

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # Fyne requiert CGO + headers OpenGL/X11
      - name: Installer les dépendances système (Fyne)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/userproxyportal-linux-${{ matrix.goarch }} \
            ./cmd/userproxyportal

      - name: Checksum SHA256
        run: |
          cd dist
          sha256sum userproxyportal-linux-${{ matrix.goarch }} \
            > userproxyportal-linux-${{ matrix.goarch }}.sha256
          cat userproxyportal-linux-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: userproxyportal-linux-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # nécessaire pour créer la release GitHub

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Vérifier les artefacts
        run: ls -lh dist/

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
